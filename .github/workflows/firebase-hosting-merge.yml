# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ADD THIS 'working-directory' line below:
      - name: Build Flutter Web
        working-directory: skillup-frontend
        run: flutter pub get && flutter build web --release
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SKILLUP_AI }}'
          channelId: live
          projectId: skillup-ai
          # ADD THIS line here too so Firebase knows where the built files are:
          entryPoint: skillup-frontend
